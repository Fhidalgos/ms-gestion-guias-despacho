name: CI/CD DockerHub y EC2

on:
push:
branches:
- main
workflow_dispatch:

permissions:
contents: read

jobs:
build-push-deploy:
runs-on: ubuntu-latest

steps:
  - name: Descargar repositorio
    uses: actions/checkout@v4

  - name: Iniciar sesión en DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Construir imagen Docker
    run: |
      docker build \
        -t "${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias:latest" \
        .

  - name: Publicar imagen en DockerHub
    run: |
      docker push \
        "${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias:latest"

  - name: Preparar llave SSH
    env:
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    run: |
      mkdir -p ~/.ssh
      printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa

  - name: Validar llave SSH
    run: |
      ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
      echo "La llave SSH tiene un formato válido"

  - name: Probar conexión con EC2
    run: |
      ssh \
        -i ~/.ssh/id_rsa \
        -o BatchMode=yes \
        -o ConnectTimeout=15 \
        -o StrictHostKeyChecking=no \
        "${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }}" \
        "echo 'Conexión SSH establecida correctamente'"

  - name: Desplegar en EC2
    run: |
      ssh \
        -i ~/.ssh/id_rsa \
        -o BatchMode=yes \
        -o ConnectTimeout=30 \
        -o StrictHostKeyChecking=no \
        "${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }}" << 'EOF'
      set -e

      echo "Iniciando despliegue en EC2"

      echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
        sudo docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      echo "Descargando imagen desde DockerHub"

      sudo docker pull \
        "${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias:latest"

      echo "Deteniendo contenedor anterior"

      sudo docker stop ms-gestion-guias || true
      sudo docker rm ms-gestion-guias || true

      echo "Iniciando nuevo contenedor"

      sudo docker run -d \
        --name ms-gestion-guias \
        --restart unless-stopped \
        -p 8080:8080 \
        -v /mnt/efs:/app/efs \
        -e EFS_PATH=/app/efs \
        -e S3_BUCKET="${{ secrets.S3_BUCKET }}" \
        -e AWS_REGION="${{ secrets.AWS_REGION }}" \
        -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
        -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
        -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
        "${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias:latest"

      echo "Contenedor desplegado correctamente"

      sudo docker ps \
        --filter "name=ms-gestion-guias"

      EOF
